<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netash Utility Web</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; --green: #7ee787; }
        body { font-family: 'Consolas', 'Monaco', monospace; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { max-width: 650px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 8px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; color: var(--accent); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: #010409; padding: 15px; border: 1px solid #30363d; text-align: center; }
        .val { font-size: 1.5rem; color: #fff; display: block; }
        .lbl { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        #log { background: #000; padding: 15px; height: 150px; overflow-y: auto; color: var(--green); border: 1px solid #30363d; font-size: 0.85rem; }
        button { background: var(--accent); color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 15px; }
        button:disabled { background: #30363d; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <strong>NETASH_UTILITY_v1.1</strong> | <span id="isp">ISP: Unknown</span>
    </div>

    <div class="stats">
        <div class="box"><span class="lbl">Latency</span><span id="ping" class="val">--</span><span class="lbl">ms</span></div>
        <div class="box"><span class="lbl">Download</span><span id="dl" class="val">--</span><span class="lbl">Mbps</span></div>
        <div class="box"><span class="lbl">Upload</span><span id="ul" class="val">--</span><span class="lbl">Mbps</span></div>
    </div>

    <div id="log">Awaiting Execute command...</div>
    
    <button id="btn" onclick="run()">EXECUTE DIAGNOSTICS</button>
</div>

<script>
    function print(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<br>> ${m}`;
        l.scrollTop = l.scrollHeight;
    }

    function run() {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        
        const ws = new WebSocket(`ws://${window.location.host}/ws/speedtest`);

        ws.onopen = () => print("Opening connection to backend...");

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            print(res.status);

            if (res.data) {
                if (res.data.ping !== undefined) document.getElementById('ping').innerText = res.data.ping;
                if (res.data.download !== undefined) document.getElementById('dl').innerText = res.data.download;
                if (res.data.upload !== undefined) document.getElementById('ul').innerText = res.data.upload;
                if (res.data.isp) document.getElementById('isp').innerText = `ISP: ${res.data.isp}`;
            }
        };

        ws.onclose = () => {
            btn.disabled = false;
            print("Socket closed.");
        };

        ws.onerror = () => {
            print("CRITICAL: Failed to reach backend at " + window.location.host);
            btn.disabled = false;
        };
    }
</script>

</body>
</html>
