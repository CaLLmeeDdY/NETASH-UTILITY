<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netash Utility Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --sidebar: #010409; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; --border: #30363d; --success: #3fb950; --danger: #f85149; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px 0; }
        .sidebar h2 { color: var(--accent); text-align: center; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; font-weight: bold; }
        .nav-item:hover { background: #161b22; }
        .nav-item.active { border-left-color: var(--accent); background: #161b22; color: #fff; }
        
        /* Main Content Styles */
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .module { display: none; background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .module.active { display: block; }
        h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Form & Button Styles */
        input[type="text"] { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; width: 200px; margin-right: 10px; }
        button { background: var(--accent); color: #fff; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { filter: brightness(1.1); }
        button.stop-btn { background: var(--danger); display: none; }
        
        /* Chart Container */
        .chart-container { margin-top: 20px; height: 300px; width: 100%; }
        #pingStatus { margin-top: 10px; font-family: monospace; color: #8b949e; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>NETASH_UTILITY</h2>
        <div class="nav-item" onclick="switchTab('speedtest')">Speed & Throughput</div>
        <div class="nav-item active" onclick="switchTab('ping')">Ping Pulse (Live)</div>
    </div>

    <div class="content">
        
        <div id="speedtest" class="module">
            <h3>Speedtest Module</h3>
            <p>Speedtest interface goes here (we will port your old UI into here later).</p>
        </div>

        <div id="ping" class="module active">
            <h3>Live Ping & Latency</h3>
            <div>
                <input type="text" id="targetIp" value="8.8.8.8" placeholder="Enter IP or Domain">
                <button id="startPing" onclick="togglePing()">Start Monitor</button>
            </div>
            <div id="pingStatus">Status: Idle</div>
            
            <div class="chart-container">
                <canvas id="pingChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // --- UI NAVIGATION LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // --- PING GRAPH LOGIC (Chart.js) ---
        const ctx = document.getElementById('pingChart').getContext('2d');
        const pingChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.1)', borderWidth: 2, fill: true, tension: 0.3 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 0 }, // Turn off animation for smooth live feed
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#30363d' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        function addDataToChart(label, data) {
            pingChart.data.labels.push(label);
            pingChart.data.datasets[0].data.push(data);
            if (pingChart.data.labels.length > 30) { // Keep only the last 30 seconds on screen
                pingChart.data.labels.shift();
                pingChart.data.datasets[0].data.shift();
            }
            pingChart.update();
        }

        // --- WEBSOCKET PING LOGIC ---
        let pingWs = null;
        let isPinging = false;

        function togglePing() {
            const btn = document.getElementById('startPing');
            const target = document.getElementById('targetIp').value;
            const statusLabel = document.getElementById('pingStatus');

            if (isPinging) {
                // STOP PINGING
                if (pingWs) pingWs.close();
                isPinging = false;
                btn.innerText = "Start Monitor";
                btn.style.background = "var(--accent)";
                statusLabel.innerText = "Status: Stopped";
                return;
            }

            // START PINGING
            isPinging = true;
            btn.innerText = "Stop Monitor";
            btn.style.background = "var(--danger)";
            
            // Clear old graph data
            pingChart.data.labels = [];
            pingChart.data.datasets[0].data = [];
            pingChart.update();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            pingWs = new WebSocket(`${protocol}//${window.location.host}/ws/ping`);

            pingWs.onopen = () => {
                statusLabel.innerText = `Status: Pinging ${target}...`;
                pingWs.send(target); // Send the IP to Python
            };

            pingWs.onmessage = (event) => {
                const res = JSON.parse(event.data);
                const timeLabel = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
                
                if (res.status === "success") {
                    addDataToChart(timeLabel, res.ping);
                    statusLabel.innerText = `Status: Reply from ${target} time=${res.ping}ms`;
                } else {
                    addDataToChart(timeLabel, 0); // Log timeout as 0
                    statusLabel.innerText = `Status: Request timed out.`;
                    statusLabel.style.color = "var(--danger)";
                }
            };

            pingWs.onclose = () => {
                isPinging = false;
                btn.innerText = "Start Monitor";
                btn.style.background = "var(--accent)";
            };
        }
    </script>
</body>
</html>
